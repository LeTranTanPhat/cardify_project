{% extends 'flashcards/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card p-4 border-info">
            <h3 class="text-info mb-4">NÂNG CẤP VŨ KHÍ: {{ deck.title }}</h3>
            
            <form method="POST" action="">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label text-secondary">Tên bộ thẻ</label>
                    <input type="text" name="title" class="form-control bg-dark text-white border-secondary" required value="{{ deck.title }}">
                </div>
                
                <div class="mb-3">
                    <label class="form-label text-secondary">Mô tả</label>
                    <textarea name="description" class="form-control bg-dark text-white border-secondary" rows="3">{{ deck.description|default_if_none:'' }}</textarea>
                </div>

                <div class="mb-4 form-check">
                    <input type="checkbox" name="is_public" class="form-check-input bg-dark border-secondary" id="publicCheck" {% if deck.is_public %}checked{% endif %}>
                    <label class="form-check-label text-secondary" for="publicCheck">
                        Chia sẻ lên Kho thẻ Cộng đồng
                    </label>
                </div>
                
                <div class="d-flex justify-content-between">
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Hủy bỏ</a>
                    <button type="submit" class="btn btn-info">LƯU THAY ĐỔI</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
