{% extends 'flashcards/base.html' %}

{% block content %}
<style>
    .vocab-card:hover { transform: translateY(-3px); border-color: var(--primary-yellow) !important; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.05) !important; }
    .transition-hover { transition: all 0.3s ease; border: 1px solid transparent; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in-topic { animation: fadeIn 0.4s ease forwards; }
</style>

<div class="row justify-content-center mt-4" data-aos="fade-up">
    <div class="col-md-10 col-lg-9">
        
        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center bg-warning bg-opacity-10 rounded-circle mb-3" style="width: 80px; height: 80px;">
                <i class="ph-duotone ph-book-open-text" style="font-size: 3rem; color: var(--primary-yellow);"></i>
            </div>
            <h2 class="fw-bold mb-2" style="color: var(--dark-text);">TỪ ĐIỂN & KHO TỪ VỰNG</h2>
            <p class="text-muted">Tra cứu nhanh chóng hoặc khám phá từ mới mỗi ngày</p>
            <a href="{% url 'all_vocab' %}" class="btn btn-outline-warning rounded-pill fw-bold mt-2 shadow-sm">
                <i class="ph-bold ph-books"></i> Mở Thư Viện Tổng Hợp
            </a>
        </div>

        <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5 mb-5" style="background-color: var(--white);">
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <select id="dict-lang" class="form-select form-select-lg bg-light border-0 shadow-none rounded-3 fw-bold text-muted">
                        <option value="en|vi">🇬🇧 Anh - Việt</option>
                        <option value="zh|vi">🇨🇳 Trung - Việt</option>
                        <option value="ko|vi">🇰🇷 Hàn - Việt</option>
                    </select>
                </div>
                <div class="col-md-8">
                    <div class="input-group input-group-lg">
                        <input type="text" id="dict-input" class="form-control bg-light border-0 shadow-none" placeholder="Nhập từ cần tra..." onkeypress="handleEnter(event)">
                        <button class="btn btn-yellow fw-bold px-4" onclick="searchWord()" id="search-btn">
                            <i class="ph-bold ph-magnifying-glass"></i> Tra cứu
                        </button>
                    </div>
                </div>
            </div>

            <div id="result-box" class="mt-2 p-4 rounded-4" style="background-color: #f8f9fa; display: none; border-left: 4px solid var(--primary-yellow);">
                <span class="badge bg-warning text-dark mb-2 rounded-pill px-3" id="result-lang">Kết quả dịch</span>
                <h3 class="fw-bold mb-3" style="color: var(--dark-text);" id="result-word">Word</h3>
                <p class="fs-5 text-muted mb-0" id="result-meaning">Nghĩa của từ sẽ hiện ở đây.</p>
            </div>
        </div>

        <div data-aos="fade-up" data-aos-delay="100">
            <div class="d-flex align-items-center mb-4">
                <i class="ph-fill ph-compass text-warning fs-3 me-2"></i>
                <h4 class="fw-bold mb-0" style="color: var(--dark-text);">Khám phá từ vựng</h4>
            </div>

            <ul class="nav nav-pills mb-4 gap-2" id="vocab-tabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active rounded-pill fw-bold px-4" data-bs-toggle="pill" data-bs-target="#tab-en" type="button">🇬🇧 Tiếng Anh</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link rounded-pill fw-bold px-4" data-bs-toggle="pill" data-bs-target="#tab-zh" type="button">🇨🇳 Tiếng Trung</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link rounded-pill fw-bold px-4" data-bs-toggle="pill" data-bs-target="#tab-ko" type="button">🇰🇷 Tiếng Hàn</button>
                </li>
            </ul>

            <div class="tab-content pb-5" id="vocab-tabContent">
                <div class="tab-pane fade show active" id="tab-en"><div class="row g-3" id="list-en"></div></div>
                <div class="tab-pane fade" id="tab-zh"><div class="row g-3" id="list-zh"></div></div>
                <div class="tab-pane fade" id="tab-ko"><div class="row g-3" id="list-ko"></div></div>
            </div>
        </div>

    </div>
</div>

<script>
    // ================= DỮ LIỆU TỪ VỰNG CÓ PHÂN LOẠI CHỦ ĐỀ =================
    const categorizedVocab = {
        en: [
            {
                topic: "Giao tiếp cơ bản",
                words: [
                    { word: "Serendipity", meaning: "Sự tình cờ may mắn" },
                    { word: "How are you?", meaning: "Bạn khỏe không?" },
                    { word: "Excuse me", meaning: "Xin lỗi (làm phiền)" },
                    { word: "Nice to meet you", meaning: "Rất vui được gặp bạn" },
                    { word: "See you later", meaning: "Hẹn gặp lại sau" },
                    { word: "Have a good day", meaning: "Chúc một ngày tốt lành" }
                ]
            },
            {
                topic: "Tính cách & Cảm xúc",
                words: [
                    { word: "Resilience", meaning: "Sự kiên cường, phục hồi" },
                    { word: "Empathy", meaning: "Sự đồng cảm" },
                    { word: "Optimistic", meaning: "Lạc quan" },
                    { word: "Introvert", meaning: "Người hướng nội" },
                    { word: "Extrovert", meaning: "Người hướng ngoại" },
                    { word: "Nostalgia", meaning: "Sự hoài niệm" }
                ]
            },
            {
                topic: "Công việc & Học tập",
                words: [
                    { word: "Procrastination", meaning: "Sự trì hoãn" },
                    { word: "Meticulous", meaning: "Tỉ mỉ, cẩn thận" },
                    { word: "Brainstorming", meaning: "Động não ý tưởng" },
                    { word: "Deadline", meaning: "Hạn chót" },
                    { word: "Collaboration", meaning: "Sự hợp tác" },
                    { word: "Productivity", meaning: "Năng suất" }
                ]
            }
        ],
        zh: [
            {
                topic: "Giao tiếp hàng ngày",
                words: [
                    { word: "你好 (Nǐ hǎo)", meaning: "Xin chào" },
                    { word: "谢谢 (Xièxiè)", meaning: "Cảm ơn" },
                    { word: "再见 (Zàijiàn)", meaning: "Tạm biệt" },
                    { word: "没关系 (Méi guānxi)", meaning: "Không có gì / Không sao" },
                    { word: "对不起 (Duìbùqǐ)", meaning: "Xin lỗi" },
                    { word: "早安 (Zǎo ān)", meaning: "Chào buổi sáng" }
                ]
            },
            {
                topic: "Ẩm thực & Mua sắm",
                words: [
                    { word: "多少钱? (Duōshǎo qián?)", meaning: "Bao nhiêu tiền?" },
                    { word: "好吃 (Hǎochī)", meaning: "Ngon miệng" },
                    { word: "买单 (Mǎidān)", meaning: "Tính tiền" },
                    { word: "太贵了 (Tài guì le)", meaning: "Đắt quá" },
                    { word: "菜单 (Càidān)", meaning: "Thực đơn" },
                    { word: "水 (Shuǐ)", meaning: "Nước" }
                ]
            }
        ],
        ko: [
            {
                topic: "Giao tiếp hàng ngày",
                words: [
                    { word: "안녕하세요 (Annyeonghaseyo)", meaning: "Xin chào" },
                    { word: "감사합니다 (Gamsahamnida)", meaning: "Cảm ơn" },
                    { word: "죄송합니다 (Joesonghamnida)", meaning: "Xin lỗi" },
                    { word: "네 (Ne) / 아니요 (Aniyo)", meaning: "Vâng / Không" },
                    { word: "안녕히 가세요 (Annyeonghi gaseyo)", meaning: "Tạm biệt (người đi)" },
                    { word: "화이팅 (Hwaiting)", meaning: "Cố lên!" }
                ]
            },
            {
                topic: "Phim ảnh & Đời sống (K-Drama)",
                words: [
                    { word: "대박 (Daebak)", meaning: "Tuyệt vời, đỉnh cao" },
                    { word: "진짜? (Jinjja?)", meaning: "Thật á?" },
                    { word: "사랑해 (Saranghae)", meaning: "Tôi yêu bạn" },
                    { word: "약속 (Yaksok)", meaning: "Lời hứa" },
                    { word: "오빠 (Oppa)", meaning: "Anh (nữ gọi)" },
                    { word: "심쿵 (Simkung)", meaning: "Tim đập thình thịch" }
                ]
            }
        ]
    };

    // Hàm render danh sách từ vựng
    function renderVocabLists() {
        const langs = ['en', 'zh', 'ko'];
        
        langs.forEach(lang => {
            const container = document.getElementById(`list-${lang}`);
            let htmlContent = '';
            
            categorizedVocab[lang].forEach((category, index) => {
                // Chỉ hiện chủ đề đầu tiên, các chủ đề sau bị ẩn đi
                const isHidden = index > 0 ? 'd-none extra-topic' : '';
                
                htmlContent += `
                    <div class="col-12 ${isHidden}">
                        <h5 class="fw-bold mt-4 mb-3" style="color: var(--primary-yellow);">
                            <i class="ph-fill ph-folder-star me-2 text-warning"></i>${category.topic}
                        </h5>
                        <div class="row g-3">
                `;
                
                category.words.forEach(item => {
                    htmlContent += `
                            <div class="col-md-6 col-lg-4">
                                <div class="card border-0 shadow-sm rounded-4 h-100 vocab-card transition-hover" style="background-color: var(--white);">
                                    <div class="card-body p-3">
                                        <div class="fw-bold fs-5 text-dark mb-1">${item.word}</div>
                                        <div class="text-muted small"><i class="ph-bold ph-arrow-elbow-down-right me-1 text-warning"></i>${item.meaning}</div>
                                    </div>
                                </div>
                            </div>
                    `;
                });
                
                htmlContent += `</div></div>`; // Đóng tag row và col-12
            });
            
            // Nếu có nhiều hơn 1 chủ đề, hiển thị nút Xem thêm
            if (categorizedVocab[lang].length > 1) {
                htmlContent += `
                    <div class="col-12 text-center mt-4">
                        <button class="btn btn-light border shadow-sm rounded-pill px-4 py-2 fw-bold text-muted" onclick="toggleMore('${lang}', this)">
                            Xem thêm tất cả chủ đề <i class="ph-bold ph-caret-down ms-1"></i>
                        </button>
                    </div>
                `;
            }
            
            container.innerHTML = htmlContent;
        });
    }

    // Hàm xử lý khi bấm nút "Xem thêm"
    function toggleMore(lang, btn) {
        const container = document.getElementById(`list-${lang}`);
        const extraTopics = container.querySelectorAll('.extra-topic');
        
        let isExpanded = false;

        extraTopics.forEach(topic => {
            if (topic.classList.contains('d-none')) {
                // Đang ẩn -> Mở ra
                topic.classList.remove('d-none');
                topic.classList.add('fade-in-topic');
                isExpanded = true;
            } else {
                // Đang mở -> Ẩn đi
                topic.classList.add('d-none');
                topic.classList.remove('fade-in-topic');
            }
        });
        
        // Đổi chữ trên nút
        if (isExpanded) {
            btn.innerHTML = 'Thu gọn <i class="ph-bold ph-caret-up ms-1"></i>';
        } else {
            btn.innerHTML = 'Xem thêm tất cả chủ đề <i class="ph-bold ph-caret-down ms-1"></i>';
        }
    }

    // Khởi tạo giao diện
    document.addEventListener("DOMContentLoaded", renderVocabLists);

    // ================= HÀM TRA CỨU TỪ API (Giữ nguyên) =================
    function searchWord() {
        const word = document.getElementById('dict-input').value.trim();
        const langPair = document.getElementById('dict-lang').value;
        const searchBtn = document.getElementById('search-btn');
        const resultBox = document.getElementById('result-box');
        
        if (!word) return Swal.fire({ icon: 'warning', title: 'Khoan đã!', text: 'Bạn chưa nhập từ cần tra.', confirmButtonColor: '#FFD700' });

        searchBtn.innerHTML = '<i class="ph ph-spinner-gap ph-spin"></i> Đang tìm...';
        searchBtn.disabled = true;

        fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=${langPair}`)
            .then(res => res.json())
            .then(data => {
                if (data.responseData && data.responseData.translatedText) {
                    document.getElementById('result-word').innerText = word;
                    document.getElementById('result-meaning').innerText = data.responseData.translatedText;
                    resultBox.style.display = 'block';
                }
            })
            .catch(() => Swal.fire('Lỗi', 'Không thể kết nối máy chủ.', 'error'))
            .finally(() => {
                searchBtn.innerHTML = '<i class="ph-bold ph-magnifying-glass"></i> Tra cứu';
                searchBtn.disabled = false;
            });
    }
    function handleEnter(e) { if (e.key === 'Enter') searchWord(); }
</script>
{% endblock %}
