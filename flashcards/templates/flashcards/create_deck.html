{% extends 'flashcards/base.html' %}

{% block content %}
<div class="row justify-content-center mt-4" data-aos="fade-up">
    <div class="col-md-8 col-lg-6">
        <div class="card border-0 shadow-sm rounded-4 p-5" style="background-color: var(--white);">
            
            <div class="text-center mb-4">
                <i class="ph-duotone ph-cards" style="font-size: 3.5rem; color: var(--primary-yellow);"></i>
                <h2 class="fw-bold mt-2" style="color: var(--dark-text);">TẠO BỘ THẺ MỚI</h2>
                <p class="text-muted">Xây dựng kho tàng kiến thức của riêng bạn</p>
            </div>
            
            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label fw-bold text-muted">Tên bộ thẻ</label>
                    <input type="text" name="title" class="form-control form-control-lg bg-light border-0 shadow-none" placeholder="VD: Tiếng Anh giao tiếp..." required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold text-muted">Mô tả (Không bắt buộc)</label>
                    <textarea name="description" class="form-control bg-light border-0 shadow-none" rows="3" placeholder="Mô tả ngắn gọn về bộ thẻ này..."></textarea>
                </div>
                
                <div class="form-check mb-5 d-flex align-items-center gap-2">
                    <input class="form-check-input mt-0" type="checkbox" name="is_public" id="isPublic" style="width: 1.2rem; height: 1.2rem; border-color: var(--primary-yellow);">
                    <label class="form-check-label text-muted" for="isPublic">
                        Chia sẻ lên Kho thẻ Cộng đồng
                    </label>
                </div>
                
                <div class="d-flex justify-content-between align-items-center">
                    <a href="{% url 'dashboard' %}" class="btn btn-light px-4 py-2 rounded-pill fw-bold text-muted border">
                        Hủy bỏ
                    </a>
                    <button type="submit" class="btn btn-yellow px-4 py-2 rounded-pill fw-bold shadow-sm">
                        XÁC NHẬN TẠO <i class="ph-bold ph-arrow-right ms-1"></i>
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>
{% endblock %}
